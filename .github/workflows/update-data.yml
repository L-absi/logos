name: Update Football Data

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/15 * * * *'
  # Allows manual run from GitHub UI
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: |
          pip install requests
          # Add any other packages your script needs, e.g., pandas
      
      - name: Run Data Aggregator
        env:
          # Store your API key securely as a secret in GitHub
         # API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python aggregator.py
      
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Auto-update football data"
          git push
